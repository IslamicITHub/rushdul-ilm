# File: backend/docker-compose.yml
# Purpose: Backend services docker composition configuration.
# Layer: Layer 2 — Backend Docker Services
# Depends on: Docker Engine, Docker Compose
# Created: 2026-06-02 | Modified: 2026-06-11
# Developer: Shaik Hidayatullah

# 🏛️ CONCEPT: Docker Compose orchestrates multi-container applications, configuring networks, volumes, and runtime arguments in a single file.
# 🏛️ ANALOGY: docker-compose.yml is like a blueprint for building a small modular shopping complex.
#    It specifies the shops (services like FastAPI, Qdrant), how they share parking lots (networks),
#    and where they store their extra inventory locked boxes (volumes).
services:
# ^ Lists all the services (isolated server containers) that Compose will instantiate together
  fastapi:
  # ^ Main python web application service running FastAPI
    build: .
    # ^ Directs Docker to compile the container image locally using the Dockerfile in the current folder
    container_name: rushd_fastapi
    # ^ Assigns a custom name tag to the running container instance for easier docker logs tracking
    network_mode: "host"
    # ^ Configures host network mode to bypass container isolation and access localhost ports directly
    volumes:
    # ^ Maps folder pathways on the host machine to target directories inside the container
      - .:/app
      # ^ Maps current backend code folder to /app inside container for live-reload updates
      - ../islamqa.info-offline:/data/islamqa
      # ^ Maps the offline scraped IslamQA database folder pathway
      - ../darulifta-deoband.com-offline:/data/deoband
      # ^ Maps the offline scraped Darul Ifta Deoband database folder pathway
    # ^ Ends volume mounts mapping list
    environment:
    # ^ Defines key-value pairs representing environment variables passed to the container
      - PYTHONUNBUFFERED=1
      # ^ Forces Python output streams to output immediately without buffering (keeps logs real-time)
      - HF_TOKEN=${HF_TOKEN}
      # ^ Passes HuggingFace authentication token for loading closed-source models if needed
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      # ^ Passes NVIDIA NIM API authorization key for cloud model inference queries
    # ^ Ends environment mapping list
    command: ["uvicorn", "fastapi_server:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    # ^ Executes uvicorn web server hosting fastapi_server:app on port 8000 with code-change hot reloading
  # ^ Ends fastapi service configuration

  qdrant:
  # ^ Database service container running the Qdrant vector database engine
    image: qdrant/qdrant:latest
    # ^ Pulls official latest Qdrant database release image from Docker Hub registry
    container_name: rushd_qdrant
    # ^ Assigns a custom name tag to the running Qdrant container instance
    ports:
    # ^ Maps port pathways on the host machine to target ports inside the container
      - "6333:6333"
      # ^ Maps host port 6333 to container port 6333 for REST API and web dashboard access
      - "6334:6334"
      # ^ Maps host port 6334 to container port 6334 for high-speed gRPC communications
    # ^ Ends port mapping list
    networks:
    # ^ Connects container instance to active virtual networks
      - rushd-network
      # ^ Attaches container to the custom rushd-network bridge
    # ^ Ends network mapping list
    volumes:
    # ^ Maps volume storage structures to container folders
      - qdrant_data:/qdrant/storage
      # ^ Maps named volume qdrant_data to the Qdrant internal database storage path for persistence
    # ^ Ends volume mapping list
  # ^ Ends qdrant service configuration

# 🏛️ CONCEPT: Docker networks establish virtual bridge connections enabling secure isolated communications.
#    Containers connected to the same network bridge communicate using service name endpoints.
# 🏛️ ANALOGY: networks bridge is like setting up a private intercom system between office rooms.
#    Only rooms wired to the network can dial each other, and they dial by room name (e.g. fastapi) instead of full phone numbers.
networks:
# ^ Declares network resource namespaces instantiated by Compose
  rushd-network:
  # ^ Custom network bridge name
    driver: bridge
    # ^ Enforces bridge driver type creating a virtual local network interface on the host machine
  # ^ Ends network definition

# 🏛️ CONCEPT: Docker volumes bind persistent storage structures that survive container restarts and builds.
#    They save data in system-managed directories outside ephemeral container lifecycles.
# 🏛️ ANALOGY: volumes are like external hard disks plugged into computers.
#    If the computer gets reset or upgraded, the files on the hard disk remain completely safe and untouched.
volumes:
# ^ Declares persistent volume resource namespaces instantiated by Compose
  ollama_data:
  # ^ Named volume storage allocation for local Ollama weights and model models caching
  qdrant_data:
  # ^ Named volume storage allocation for Qdrant vector collection files persistence
# ^ Ends volumes definition
